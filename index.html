    bg: 'https://images.unsplash.com/photo-1514119412350-e174d90d280e?w=1920&q=80',
    emoji: '🎠',
    endingTitle: '奇蹟結局：摸到天空的那一刻',
    resultText: '你選擇了最浪漫的方式，木馬與煙火同步的奇蹟畫面就此誕生。「拔拔，我摸到天了！」——這句話，會讓你記一輩子。'
  },
};

// ── 遊戲引擎 ──
let currentScene = 'start';

function setBg(url) {
  const bg = document.getElementById('bg');
  bg.style.opacity = '0';
  setTimeout(() => {
    bg.style.backgroundImage = `url(${url})`;
    bg.style.opacity = '1';
  }, 500);
}

function renderScene(sceneId) {
  const scene = scenes[sceneId];
  if (!scene) return;

  // 檢查是否為結局
  if (scene.emoji) {
    showEnding(scene);
    return;
  }

  currentScene = sceneId;
  setBg(scene.bg);

  document.getElementById('scene-title').textContent = scene.title;
  document.getElementById('story-text').innerHTML = scene.text;

  const choicesEl = document.getElementById('choices');
  choicesEl.innerHTML = '';

  scene.choices.forEach(choice => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn fade-in';
    btn.textContent = choice.text;
    btn.onclick = () => renderScene(choice.next);
    choicesEl.appendChild(btn);
  });

  // 重新顯示 story-box
  const storyBox = document.getElementById('story-box');
  const resultBox = document.getElementById('result-box');
  storyBox.classList.remove('hidden');
  storyBox.classList.add('fade-in');
  resultBox.classList.remove('show');
  resultBox.classList.add('hidden');
  document.getElementById('restart-btn').classList.remove('show');
}

function showEnding(scene) {
  setBg(scene.bg);

  const storyBox = document.getElementById('story-box');
  const resultBox = document.getElementById('result-box');

  storyBox.classList.add('hidden');
  resultBox.classList.remove('hidden');
  resultBox.classList.add('show', 'fade-in');

  document.getElementById('result-emoji').textContent = scene.emoji;
  document.getElementById('result-title').textContent = scene.endingTitle;
  document.getElementById('result-text').textContent = scene.resultText;
  document.getElementById('restart-btn').classList.add('show');
}

document.getElementById('restart-btn').onclick = () => {
  renderScene('start');
};

// 預載背景圖
const preloader = new Image();
preloader.src = scenes.start.bg;

// 啟動
renderScene('start');
</script>
