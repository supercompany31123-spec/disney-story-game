let current = 'start';
let gameActive = false;

function setBg(url) {
  const bg = document.getElementById('bg');
  bg.style.opacity = '0';
  setTimeout(() => { bg.style.backgroundImage = `url(${url})`; bg.style.opacity = '1'; }, 400);
}

function render(id) {
  const scene = S[id];
  if (!scene) return;
  current = id;

  const isEnding = scene.emoji;
  const panel = document.getElementById('story-panel');
  const container = document.getElementById('choices-container');
  const endingPanel = document.getElementById('ending-panel');

  if (isEnding) {
    panel.style.display = 'none';
    container.innerHTML = '';
    endingPanel.classList.add('show');
    endingPanel.classList.add('fade-in');
    endingPanel.style.animation = 'none';
    endingPanel.offsetHeight;
    endingPanel.style.animation = 'fadeUp 0.6s ease-out';
    document.getElementById('ending-emoji').textContent = scene.emoji;
    document.getElementById('ending-title').textContent = scene.endingTitle;
    document.getElementById('ending-text').textContent = scene.resultText;
    setBg(scene.bg);
    document.getElementById('progress-fill').style.width = '100%';
    document.getElementById('progress-text').textContent = 'THE END';
    return;
  }

  endingPanel.classList.remove('show');
  panel.style.display = 'block';
  panel.style.animation = 'none';
  panel.offsetHeight;
  panel.style.animation = 'fadeUp 0.6s ease-out';

  document.getElementById('scene-label').textContent = scene.label;
  document.getElementById('story-text').innerHTML = scene.text;

  const pct = ((scene.chapter - 1) / TOTAL) * 100;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = 'CHAPTER ' + scene.chapter;

  container.innerHTML = '';
  scene.choices.forEach((c, i) => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn fade-in';
    btn.style.animationDelay = (i * 0.08) + 's';
    btn.textContent = c.text;
    btn.onclick = () => { gameActive = true; render(c.next); window.scrollTo({top:0,behavior:'smooth'}); };
    container.appendChild(btn);
  });

  if (!gameActive) {
    const startBtn = document.createElement('button');
    startBtn.className = 'choice-btn fade-in';
    startBtn.textContent = '▶️ 開始冒險';
    startBtn.onclick = () => { gameActive = true; render('start'); window.scrollTo({top:0,behavior:'smooth'}); };
    startBtn.style.display = 'none';
    container.appendChild(startBtn);
  }
}

document.getElementById('restart-btn').onclick = () => { gameActive = false; render('start'); };
render('start');
</script>
